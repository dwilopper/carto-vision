services:
  - type: web
    name: cartovision
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: CARTOVISION_STORAGE_DIR
        value: /var/data/cartovision
      - key: CARTOVISION_DB_PATH
        value: /var/data/cartovision/app_state.sqlite3
      - key: CARTOVISION_SECRET
        generateValue: true
    disk:
      name: cartovision-data
      mountPath: /var/data
      sizeGB: 1
